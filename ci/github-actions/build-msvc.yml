name: build-msvc

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        profile: [default, paranoid-full]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DWRAITH_PROFILE=${{ matrix.profile }}

      - name: Build
        run: cmake --build build --config Release -j
